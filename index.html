<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant & Security Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const CREATOR_METADATA = {
            name: "Kumkum Goswami",
            role: "Lead Systems Architect",
            projectUuid: "ALLY-SEC-2026-NEXUS-99X"
        };

        function AllyApp() {
            const [activeTab, setActiveTab] = React.useState('database');
            const [records, setRecords] = React.useState(() => {
                const saved = localStorage.getItem('allyRecords');
                return saved ? JSON.parse(saved) : [];
            });
            const [form, setForm] = React.useState({ name: '', email: '', data: '' });
            const [isAdding, setIsAdding] = React.useState(false);

            React.useEffect(() => {
                localStorage.setItem('allyRecords', JSON.stringify(records));
            }, [records]);

            const addRecord = () => {
                if (!form.name || !form.email || !form.data) {
                    alert('⚠️ Fill all fields!');
                    return;
                }
                setIsAdding(true);
                setTimeout(() => {
                    setRecords([...records, {
                        id: Date.now(),
                        ...form,
                        timestamp: new Date().toLocaleString()
                    }]);
                    setForm({ name: '', email: '', data: '' });
                    setIsAdding(false);
                    alert('✅ Entry added!');
                }, 500);
            };

            const deleteRecord = (id) => {
                if (window.confirm('Delete this entry?')) {
                    setRecords(records.filter(r => r.id !== id));
                    alert('✅ Deleted!');
                }
            };

            const exportCSV = () => {
                let csv = 'Name,Email,Data,Timestamp\n';
                records.forEach(r => {
                    csv += `"${r.name}","${r.email}","${r.data}","${r.timestamp}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ally_records.csv';
                a.click();
                alert('✅ Exported to ally_records.csv');
            };

            const clearAll = () => {
                if (window.confirm('Delete ALL entries? This cannot be undone!')) {
                    setRecords([]);
                    alert('⚠️ All records cleared!');
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-emerald-400">⚡ ALLY DATABASE</h1>
                            <span className="text-xs bg-emerald-600 px-3 py-1 rounded-full text-white font-bold">
                                ✅ LOCAL STORAGE ENABLED
                            </span>
                        </div>
                    </header>

                    <nav className="bg-gray-800 border-b border-gray-700 flex justify-center space-x-2 p-2 flex-wrap">
                        <button 
                            onClick={() => setActiveTab('database')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'database' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>
                            💾 DATABASE
                        </button>
                        <button 
                            onClick={() => setActiveTab('info')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'info' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>
                            ℹ️ INFO
                        </button>
                    </nav>

                    <main className="flex-grow container mx-auto p-4 max-w-6xl">
                        {activeTab === 'database' && (
                            <div className="space-y-6">
                                {/* Add Entry */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h2 className="text-xl font-bold text-emerald-300 mb-4">➕ ADD NEW ENTRY</h2>
                                    <div className="space-y-3">
                                        <input 
                                            type="text"
                                            placeholder="Full Name"
                                            value={form.name}
                                            onChange={(e) => setForm({...form, name: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                                        />
                                        <input 
                                            type="email"
                                            placeholder="Email"
                                            value={form.email}
                                            onChange={(e) => setForm({...form, email: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                                        />
                                        <textarea 
                                            placeholder="Data / Notes"
                                            value={form.data}
                                            onChange={(e) => setForm({...form, data: e.target.value})}
                                            rows="3"
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                                        />
                                        <button 
                                            onClick={addRecord}
                                            disabled={isAdding}
                                            className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">
                                            {isAdding ? '⏳ ADDING...' : '✅ ADD TO DATABASE'}
                                        </button>
                                    </div>
                                </div>

                                {/* Records List */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-bold text-emerald-300">📋 RECORDS ({records.length})</h2>
                                        <div className="space-x-2">
                                            <button 
                                                onClick={exportCSV}
                                                className="bg-green-600 hover:bg-green-500 text-white text-sm px-4 py-2 rounded-lg transition">
                                                📥 EXPORT CSV
                                            </button>
                                            <button 
                                                onClick={clearAll}
                                                className="bg-red-600 hover:bg-red-500 text-white text-sm px-4 py-2 rounded-lg transition">
                                                🗑️ CLEAR ALL
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {records.length === 0 ? (
                                        <p className="text-gray-400 text-center py-12">📭 No records yet!</p>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {records.map((record, idx) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4 hover:border-emerald-600 transition">
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex-1">
                                                            <h3 className="text-emerald-400 font-bold">#{idx + 1} {record.name}</h3>
                                                            <p className="text-gray-400 text-sm">{record.email}</p>
                                                            <p className="text-gray-300 text-sm mt-2 bg-gray-800 p-2 rounded">{record.data}</p>
                                                            <p className="text-gray-500 text-xs mt-2">⏰ {record.timestamp}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteRecord(record.id)}
                                                            className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1 rounded ml-2 whitespace-nowrap">
                                                            🗑️ DELETE
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-emerald-600 rounded-xl p-6">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-4">✨ ABOUT ALLY</h2>
                                    <div className="space-y-4 text-gray-300">
                                        <div>
                                            <p className="text-gray-500">CREATOR</p>
                                            <p className="text-emerald-400 text-lg font-bold">{CREATOR_METADATA.name}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-500">ROLE</p>
                                            <p className="text-blue-400">{CREATOR_METADATA.role}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-500">PROJECT ID</p>
                                            <p className="text-gray-300 font-mono">{CREATOR_METADATA.projectUuid}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-4">🚀 FEATURES</h3>
                                    <ul className="space-y-2 text-gray-300">
                                        <li>✅ Add unlimited database records</li>
                                        <li>✅ View all entries in real-time</li>
                                        <li>✅ Delete individual records</li>
                                        <li>✅ Export data to CSV</li>
                                        <li>✅ Local storage (no server needed)</li>
                                        <li>✅ Works offline</li>
                                        <li>✅ 100% secure & private</li>
                                    </ul>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-4">💾 DATA STORAGE</h3>
                                    <p className="text-gray-300 mb-4">Your data is stored in your browser's local storage. This means:</p>
                                    <ul className="space-y-2 text-gray-400 text-sm">
                                        <li>• Data stays on your device</li>
                                        <li>• No cloud servers involved</li>
                                        <li>• Completely private & secure</li>
                                        <li>• Available offline</li>
                                        <li>• Cleared only if you clear browser data</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-gray-800 border-t border-gray-700 p-4 text-center text-gray-500 text-xs">
                        Ally • Local Storage Database • Powered by {CREATOR_METADATA.name} © 2026
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllyApp />);
    </script>
</body>
</html>
