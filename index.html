<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant - Ultimate Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const CREATOR = { 
            name: "Kumkum Goswami", 
            role: "Lead Systems Architect", 
            projectId: "ALLY-SEC-2026-NEXUS-99X" 
        };

        const TRASH_RETENTION_DAYS = 30;

        function AllyApp() {
            const [activeTab, setActiveTab] = React.useState('database');
            const [records, setRecords] = React.useState(() => {
                const saved = localStorage.getItem('allyRecords');
                return saved ? JSON.parse(saved) : [];
            });
            const [trash, setTrash] = React.useState(() => {
                const saved = localStorage.getItem('allyTrash');
                return saved ? JSON.parse(saved) : [];
            });
            const [filteredRecords, setFilteredRecords] = React.useState(records);
            const [form, setForm] = React.useState({ name: '', email: '', data: '' });
            const [editingId, setEditingId] = React.useState(null);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filterEmail, setFilterEmail] = React.useState('');
            const [isAdding, setIsAdding] = React.useState(false);

            // Auto-clean expired trash
            React.useEffect(() => {
                const now = Date.now();
                const activeTrash = trash.filter(item => {
                    const expiresAt = item.deletedAt + (TRASH_RETENTION_DAYS * 24 * 60 * 60 * 1000);
                    return expiresAt > now;
                });
                if (activeTrash.length !== trash.length) {
                    setTrash(activeTrash);
                }
            }, [trash]);

            // Save records to localStorage
            React.useEffect(() => {
                localStorage.setItem('allyRecords', JSON.stringify(records));
                filterRecords();
            }, [records]);

            // Save trash to localStorage
            React.useEffect(() => {
                localStorage.setItem('allyTrash', JSON.stringify(trash));
            }, [trash]);

            // Filter records
            const filterRecords = () => {
                let filtered = records.filter(r => 
                    (r.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                     r.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                     r.data.toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (!filterEmail || r.email.toLowerCase().includes(filterEmail.toLowerCase()))
                );
                setFilteredRecords(filtered);
            };

            React.useEffect(() => {
                filterRecords();
            }, [searchTerm, filterEmail, records]);

            // Add or Update Record
            const addOrUpdateRecord = () => {
                if (!form.name || !form.email || !form.data) {
                    alert('⚠️ Fill all fields!');
                    return;
                }

                setIsAdding(true);
                setTimeout(() => {
                    if (editingId) {
                        setRecords(records.map(r => 
                            r.id === editingId 
                                ? { ...r, ...form, timestamp: new Date().toLocaleString() } 
                                : r
                        ));
                        alert('✅ Record updated!');
                    } else {
                        const newRecord = { 
                            id: Date.now(), 
                            ...form, 
                            timestamp: new Date().toLocaleString() 
                        };
                        setRecords([...records, newRecord]);
                        alert('✅ Record added!');
                    }
                    setForm({ name: '', email: '', data: '' });
                    setEditingId(null);
                    setIsAdding(false);
                }, 500);
            };

            // Edit Record
            const editRecord = (record) => {
                setForm(record);
                setEditingId(record.id);
                setActiveTab('database');
            };

            // Move to Trash
            const deleteRecord = (id) => {
                const record = records.find(r => r.id === id);
                if (!record) return;

                if (window.confirm('🗑️ Move to trash? You can recover it within 30 days.')) {
                    setRecords(records.filter(r => r.id !== id));
                    setTrash([...trash, {
                        ...record,
                        deletedAt: Date.now(),
                        originalId: id
                    }]);
                    alert('✅ Moved to trash! You can recover it in the Trash tab.');
                }
            };

            // Recover from Trash
            const recoverFromTrash = (trashItem) => {
                if (window.confirm(`♻️ Recover "${trashItem.name}"?`)) {
                    // Remove from trash
                    setTrash(trash.filter(t => t.originalId !== trashItem.originalId));
                    // Add back to records
                    const recoveredRecord = { ...trashItem };
                    delete recoveredRecord.deletedAt;
                    delete recoveredRecord.originalId;
                    setRecords([...records, recoveredRecord]);
                    alert('✅ Record recovered!');
                }
            };

            // Permanently Delete from Trash
            const permanentlyDeleteFromTrash = (trashItem) => {
                if (window.confirm('⚠️ PERMANENTLY delete? This CANNOT be recovered!')) {
                    setTrash(trash.filter(t => t.originalId !== trashItem.originalId));
                    alert('🗑️ Permanently deleted!');
                }
            };

            // Empty entire trash
            const emptyTrash = () => {
                if (window.confirm('🚨 Permanently delete ALL trash items? This CANNOT be undone!')) {
                    if (window.confirm('⚠️ Are you ABSOLUTELY sure?')) {
                        setTrash([]);
                        alert('🗑️ Trash emptied!');
                    }
                }
            };

            // Calculate days until expiration
            const getDaysUntilExpiration = (deletedAt) => {
                const expiresAt = deletedAt + (TRASH_RETENTION_DAYS * 24 * 60 * 60 * 1000);
                const now = Date.now();
                const daysLeft = Math.ceil((expiresAt - now) / (24 * 60 * 60 * 1000));
                return Math.max(0, daysLeft);
            };

            // Export to CSV
            const exportCSV = () => {
                let csv = 'Name,Email,Data,Timestamp\n';
                records.forEach(r => {
                    csv += `"${r.name}","${r.email}","${r.data.replace(/"/g, '""')}","${r.timestamp}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'ally_backup_' + new Date().toISOString().split('T')[0] + '.csv';
                link.click();
                alert('✅ Exported to CSV!');
            };

            // Export to JSON
            const exportJSON = () => {
                const backup = {
                    version: 1,
                    exported: new Date().toISOString(),
                    creator: CREATOR.name,
                    records: records
                };
                const json = JSON.stringify(backup, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'ally_backup_' + new Date().toISOString().split('T')[0] + '.json';
                link.click();
                alert('✅ Exported to JSON!');
            };

            // Import from JSON
            const importJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const backup = JSON.parse(e.target.result);
                        if (backup.records && Array.isArray(backup.records)) {
                            if (window.confirm(`📥 Import ${backup.records.length} records? This will ADD to existing records.`)) {
                                setRecords([...records, ...backup.records]);
                                alert('✅ Imported successfully!');
                            }
                        } else {
                            alert('❌ Invalid backup file format!');
                        }
                    } catch (error) {
                        alert('❌ Error reading file: ' + error.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            // Clear All Active Records
            const clearAll = () => {
                if (window.confirm('🚨 DELETE ALL ACTIVE RECORDS? They will go to trash for 30 days.')) {
                    if (window.confirm('⚠️ Are you ABSOLUTELY sure?')) {
                        const now = Date.now();
                        const deletedRecords = records.map(r => ({
                            ...r,
                            deletedAt: now,
                            originalId: r.id
                        }));
                        setTrash([...trash, ...deletedRecords]);
                        setRecords([]);
                        setForm({ name: '', email: '', data: '' });
                        setEditingId(null);
                        alert('✅ All records moved to trash! Check the Trash tab to recover or delete permanently.');
                    }
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-lg">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <span className="text-3xl">⚡</span>
                                <h1 className="text-2xl font-bold text-emerald-400">ALLY ULTIMATE</h1>
                            </div>
                            <div className="flex items-center space-x-3">
                                <span className="bg-emerald-600 text-white text-xs px-3 py-1 rounded-full font-bold">✅ LOCAL STORAGE</span>
                                <span className="bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-bold">📦 {records.length}</span>
                                {trash.length > 0 && <span className="bg-red-600 text-white text-xs px-3 py-1 rounded-full font-bold">🗑️ {trash.length}</span>}
                            </div>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <nav className="bg-gray-800 border-b border-gray-700 p-2 flex justify-center space-x-2 flex-wrap gap-2 overflow-x-auto">
                        <button 
                            onClick={() => setActiveTab('database')}
                            className={`px-4 py-2 rounded-md transition font-bold whitespace-nowrap ${activeTab === 'database' ? 'bg-emerald-600 text-white' : 'bg-gray-700 text-gray-300 hover:text-white'}`}>
                            💾 DATABASE
                        </button>
                        <button 
                            onClick={() => setActiveTab('search')}
                            className={`px-4 py-2 rounded-md transition font-bold whitespace-nowrap ${activeTab === 'search' ? 'bg-emerald-600 text-white' : 'bg-gray-700 text-gray-300 hover:text-white'}`}>
                            🔍 SEARCH
                        </button>
                        <button 
                            onClick={() => setActiveTab('trash')}
                            className={`px-4 py-2 rounded-md transition font-bold whitespace-nowrap ${activeTab === 'trash' ? 'bg-red-600 text-white' : 'bg-gray-700 text-gray-300 hover:text-white'}`}>
                            🗑️ TRASH ({trash.length})
                        </button>
                        <button 
                            onClick={() => setActiveTab('backup')}
                            className={`px-4 py-2 rounded-md transition font-bold whitespace-nowrap ${activeTab === 'backup' ? 'bg-emerald-600 text-white' : 'bg-gray-700 text-gray-300 hover:text-white'}`}>
                            💾 BACKUP
                        </button>
                        <button 
                            onClick={() => setActiveTab('info')}
                            className={`px-4 py-2 rounded-md transition font-bold whitespace-nowrap ${activeTab === 'info' ? 'bg-emerald-600 text-white' : 'bg-gray-700 text-gray-300 hover:text-white'}`}>
                            ℹ️ INFO
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow container mx-auto p-4 max-w-6xl w-full">
                        {/* DATABASE TAB */}
                        {activeTab === 'database' && (
                            <div className="space-y-6">
                                {/* Add/Edit Form */}
                                <div className="bg-gray-800 border-2 border-emerald-600 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-6">
                                        {editingId ? '✏️ EDIT ENTRY' : '➕ ADD NEW ENTRY'}
                                    </h2>
                                    <div className="space-y-4">
                                        <input 
                                            type="text"
                                            placeholder="Full Name"
                                            value={form.name}
                                            onChange={(e) => setForm({...form, name: e.target.value})}
                                            className="w-full bg-gray-900 border-2 border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none transition"
                                        />
                                        <input 
                                            type="email"
                                            placeholder="Email Address"
                                            value={form.email}
                                            onChange={(e) => setForm({...form, email: e.target.value})}
                                            className="w-full bg-gray-900 border-2 border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none transition"
                                        />
                                        <textarea 
                                            placeholder="Data / Notes / Information"
                                            value={form.data}
                                            onChange={(e) => setForm({...form, data: e.target.value})}
                                            rows="4"
                                            className="w-full bg-gray-900 border-2 border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none transition resize-none"
                                        />
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={addOrUpdateRecord}
                                                disabled={isAdding}
                                                className="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 disabled:opacity-50 text-white font-bold py-3 px-6 rounded-lg transition shadow-lg">
                                                {isAdding ? '⏳ Processing...' : (editingId ? '✏️ UPDATE RECORD' : '✅ ADD RECORD')}
                                            </button>
                                            {editingId && (
                                                <button 
                                                    onClick={() => {
                                                        setEditingId(null);
                                                        setForm({name: '', email: '', data: ''});
                                                    }}
                                                    className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition">
                                                    ❌ CANCEL
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Records List */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-emerald-300">📋 ALL RECORDS ({records.length})</h2>
                                        <button 
                                            onClick={exportCSV}
                                            className="bg-green-600 hover:bg-green-500 text-white font-bold px-4 py-2 rounded-lg transition">
                                            📥 EXPORT CSV
                                        </button>
                                    </div>
                                    
                                    {records.length === 0 ? (
                                        <div className="text-gray-400 text-center py-16">
                                            <p className="text-3xl mb-2">📭</p>
                                            <p>No records yet! Add your first entry above.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                                            {records.map((record, idx) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4 hover:border-emerald-500 transition">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <div className="flex-1">
                                                            <h3 className="text-emerald-400 font-bold text-lg">#{idx + 1} {record.name}</h3>
                                                            <p className="text-gray-400 text-sm">📧 {record.email}</p>
                                                        </div>
                                                        <div className="flex gap-2 ml-2">
                                                            <button 
                                                                onClick={() => editRecord(record)}
                                                                className="bg-yellow-600 hover:bg-yellow-500 text-white text-xs font-bold px-3 py-1 rounded transition">
                                                                ✏️ EDIT
                                                            </button>
                                                            <button 
                                                                onClick={() => deleteRecord(record.id)}
                                                                className="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-3 py-1 rounded transition">
                                                                🗑️ DELETE
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <p className="text-gray-300 text-sm bg-gray-800 p-3 rounded border border-gray-700 mb-2">{record.data}</p>
                                                    <p className="text-gray-500 text-xs">⏰ {record.timestamp}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* SEARCH TAB */}
                        {activeTab === 'search' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-6">🔍 SEARCH & FILTER</h2>
                                    
                                    <div className="space-y-4 mb-6">
                                        <input 
                                            type="text"
                                            placeholder="Search by name, email, or data..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full bg-gray-900 border-2 border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none transition"
                                        />
                                        <input 
                                            type="email"
                                            placeholder="Filter by email..."
                                            value={filterEmail}
                                            onChange={(e) => setFilterEmail(e.target.value)}
                                            className="w-full bg-gray-900 border-2 border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none transition"
                                        />
                                    </div>

                                    <div className="mb-4">
                                        <h3 className="text-emerald-400 font-bold text-lg">
                                            🎯 Results: {filteredRecords.length} of {records.length} found
                                        </h3>
                                    </div>

                                    {filteredRecords.length === 0 ? (
                                        <div className="text-gray-400 text-center py-12">
                                            <p className="text-2xl mb-2">🔎</p>
                                            <p>No matching records found.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                                            {filteredRecords.map((record, idx) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4 hover:border-emerald-500 transition">
                                                    <h3 className="text-emerald-400 font-bold">{record.name}</h3>
                                                    <p className="text-gray-400 text-sm mb-2">{record.email}</p>
                                                    <p className="text-gray-300 text-sm bg-gray-800 p-2 rounded">{record.data}</p>
                                                    <div className="flex gap-2 mt-3">
                                                        <button 
                                                            onClick={() => editRecord(record)}
                                                            className="bg-yellow-600 hover:bg-yellow-500 text-white text-xs font-bold px-3 py-1 rounded transition">
                                                            ✏️ EDIT
                                                        </button>
                                                        <button 
                                                            onClick={() => deleteRecord(record.id)}
                                                            className="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-3 py-1 rounded transition">
                                                            🗑️ DELETE
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TRASH TAB */}
                        {activeTab === 'trash' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border-2 border-red-600 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-red-400 mb-6">🗑️ TRASH & RECOVERY</h2>
                                    
                                    <div className="bg-red-900 border border-red-600 rounded-lg p-4 mb-6">
                                        <h3 className="text-red-300 font-bold mb-2">♻️ Recovery System:</h3>
                                        <ul className="text-red-200 text-sm space-y-1">
                                            <li>✅ Deleted records are kept for <strong>{TRASH_RETENTION_DAYS} days</strong></li>
                                            <li>✅ Recover records anytime within the retention period</li>
                                            <li>✅ After {TRASH_RETENTION_DAYS} days, records are permanently deleted</li>
                                            <li>✅ You can also manually delete items from trash</li>
                                        </ul>
                                    </div>

                                    {trash.length === 0 ? (
                                        <div className="text-gray-400 text-center py-12">
                                            <p className="text-3xl mb-2">✨</p>
                                            <p>Trash is empty! Your deleted records will appear here.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-gray-300">Total items in trash: {trash.length}</span>
                                                <button 
                                                    onClick={emptyTrash}
                                                    className="bg-red-600 hover:bg-red-500 text-white font-bold px-4 py-2 rounded-lg transition text-sm">
                                                    🗑️ EMPTY TRASH
                                                </button>
                                            </div>
                                            
                                            <div className="space-y-3 max-h-96 overflow-y-auto">
                                                {trash.map((item, idx) => {
                                                    const daysLeft = getDaysUntilExpiration(item.deletedAt);
                                                    const expiryDate = new Date(item.deletedAt + (TRASH_RETENTION_DAYS * 24 * 60 * 60 * 1000));
                                                    return (
                                                        <div key={item.originalId} className="bg-gray-900 border-2 border-red-700 rounded-lg p-4">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <div className="flex-1">
                                                                    <h3 className="text-red-400 font-bold text-lg">#{idx + 1} {item.name}</h3>
                                                                    <p className="text-gray-400 text-sm">📧 {item.email}</p>
                                                                </div>
                                                                <div className={`text-xs font-bold px-3 py-1 rounded-full ${daysLeft <= 7 ? 'bg-orange-600 text-white' : daysLeft <= 3 ? 'bg-red-600 text-white' : 'bg-yellow-600 text-white'}`}>
                                                                    ⏳ {daysLeft} days left
                                                                </div>
                                                            </div>
                                                            
                                                            <p className="text-gray-300 text-sm bg-gray-800 p-2 rounded border border-gray-700 mb-3">{item.data}</p>
                                                            
                                                            <div className="bg-gray-800 p-2 rounded mb-3 text-xs text-gray-400 border-l-2 border-red-600">
                                                                🗑️ Deleted: {new Date(item.deletedAt).toLocaleString()}
                                                                <br/>
                                                                ⏰ Auto-delete on: {expiryDate.toLocaleString()}
                                                            </div>

                                                            <div className="flex gap-2">
                                                                <button 
                                                                    onClick={() => recoverFromTrash(item)}
                                                                    className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold px-3 py-2 rounded transition">
                                                                    ♻️ RECOVER
                                                                </button>
                                                                <button 
                                                                    onClick={() => permanentlyDeleteFromTrash(item)}
                                                                    className="flex-1 bg-red-700 hover:bg-red-600 text-white font-bold px-3 py-2 rounded transition">
                                                                    ❌ DELETE NOW
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* BACKUP TAB */}
                        {activeTab === 'backup' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-6">💾 BACKUP & RESTORE</h2>
                                    
                                    <div className="bg-blue-900 border border-blue-600 rounded-lg p-4 mb-6">
                                        <h3 className="text-blue-300 font-bold mb-2">💡 How it works:</h3>
                                        <ul className="text-blue-200 text-sm space-y-1">
                                            <li>✅ Export your data as CSV or JSON file</li>
                                            <li>✅ Download to your computer</li>
                                            <li>✅ Import anytime to restore or merge</li>
                                            <li>✅ 100% local, no cloud needed</li>
                                        </ul>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                        <div className="bg-gray-900 border border-gray-700 rounded-lg p-4">
                                            <h3 className="text-emerald-300 font-bold mb-4">📥 EXPORT DATA</h3>
                                            <p className="text-gray-400 text-sm mb-4">Current records: {records.length}</p>
                                            <button 
                                                onClick={exportJSON}
                                                className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 rounded-lg transition mb-2">
                                                📤 Export as JSON
                                            </button>
                                            <button 
                                                onClick={exportCSV}
                                                className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-lg transition">
                                                📊 Export as CSV
                                            </button>
                                        </div>

                                        <div className="bg-gray-900 border border-gray-700 rounded-lg p-4">
                                            <h3 className="text-emerald-300 font-bold mb-4">📤 IMPORT DATA</h3>
                                            <label className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition text-center cursor-pointer block">
                                                📥 Import JSON File
                                                <input 
                                                    type="file"
                                                    accept=".json"
                                                    onChange={importJSON}
                                                    className="hidden"
                                                />
                                            </label>
                                            <p className="text-gray-400 text-xs mt-4">Select a JSON backup file to restore or merge records</p>
                                        </div>
                                    </div>

                                    <div className="bg-red-900 border border-red-600 rounded-lg p-4">
                                        <h3 className="text-red-300 font-bold mb-2">⚠️ DANGER ZONE</h3>
                                        <button 
                                            onClick={clearAll}
                                            className="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-lg transition">
                                            🗑️ DELETE ALL RECORDS (Moves to Trash)
                                        </button>
                                        <p className="text-red-300 text-xs mt-2">Records will be moved to trash and can be recovered for 30 days</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* INFO TAB */}
                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border-2 border-emerald-600 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-4">✨ ABOUT ALLY ULTIMATE</h2>
                                    <div className="space-y-3 text-gray-300">
                                        <div className="flex justify-between py-2 border-b border-gray-700">
                                            <span className="text-gray-500">Creator:</span>
                                            <span className="text-emerald-400 font-bold">{CREATOR.name}</span>
                                        </div>
                                        <div className="flex justify-between py-2 border-b border-gray-700">
                                            <span className="text-gray-500">Role:</span>
                                            <span className="text-blue-400 font-bold">{CREATOR.role}</span>
                                        </div>
                                        <div className="flex justify-between py-2 border-b border-gray-700">
                                            <span className="text-gray-500">Project ID:</span>
                                            <span className="text-yellow-400 font-mono text-sm">{CREATOR.projectId}</span>
                                        </div>
                                        <div className="flex justify-between py-2">
                                            <span className="text-gray-500">Version:</span>
                                            <span className="text-purple-400 font-bold">3.0 Ultimate with Trash</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-4">🚀 FEATURES</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">✅ Add Records</p>
                                            <p className="text-gray-400 text-sm">Create new database entries</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">✏️ Edit Records</p>
                                            <p className="text-gray-400 text-sm">Update existing entries</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">🗑️ Delete Records</p>
                                            <p className="text-gray-400 text-sm">Moves to trash (recoverable)</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">♻️ Trash & Recovery</p>
                                            <p className="text-gray-400 text-sm">Recover deleted items for 30 days</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">🔍 Search & Filter</p>
                                            <p className="text-gray-400 text-sm">Find records instantly</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">📥 Export Data</p>
                                            <p className="text-gray-400 text-sm">CSV & JSON backup</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">📤 Import Data</p>
                                            <p className="text-gray-400 text-sm">Restore from backup</p>
                                        </div>
                                        <div className="bg-gray-900 p-3 rounded border border-gray-700">
                                            <p className="text-emerald-400 font-bold">💾 Local Storage</p>
                                            <p className="text-gray-400 text-sm">100% private & secure</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-4">📚 HOW TO USE</h3>
                                    <ol className="text-gray-300 space-y-2 list-decimal list-inside">
                                        <li>Go to <strong>💾 DATABASE</strong> tab</li>
                                        <li>Fill in Name, Email, and Data fields</li>
                                        <li>Click <strong>✅ ADD RECORD</strong></li>
                                        <li>Use <strong>✏️ EDIT</strong> to update records</li>
                                        <li>Use <strong>🗑️ DELETE</strong> to move records to trash</li>
                                        <li>Check <strong>🗑️ TRASH</strong> tab to recover deleted items</li>
                                        <li>Use <strong>🔍 SEARCH</strong> to find specific records</li>
                                        <li>Use <strong>💾 BACKUP</strong> to export/import data</li>
                                    </ol>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 border-t border-gray-700 p-4 text-center text-gray-500 text-xs mt-auto">
                        <p>Ally Ultimate Edition v3.0 • {CREATOR.name} © 2026 • Local Storage Database with 30-Day Trash Recovery • No Cloud Required</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllyApp />);
    </script>
</body>
</html>
