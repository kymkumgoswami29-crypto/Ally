<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant & Security Suite</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // Global App State & Config
        const CREATOR_METADATA = {
            name: "Kumkum Goswami",
            role: "Lead Systems Architect",
            projectUuid: "ALLY-SEC-2026-NEXUS-99X",
            integrityHash: "0x7F...KUMKUM...99"
        };

        // Firebase Configuration - SETUP REQUIRED
        const FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase (will show setup prompt if not configured)
        let db = null;
        let firebaseReady = false;

        const initializeFirebase = async () => {
            try {
                if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY_HERE") {
                    console.warn("Firebase not configured. Using demo mode.");
                    return false;
                }
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.database();
                firebaseReady = true;
                return true;
            } catch (error) {
                console.error("Firebase initialization error:", error);
                return false;
            }
        };

        initializeFirebase();

        function AllyApp() {
            const [activeTab, setActiveTab] = React.useState('workspace');
            const [stabilityScore, setStabilityScore] = React.useState(94.2);
            const [isCalibrating, setIsCalibrating] = React.useState(false);
            const [testLogs, setTestLogs] = React.useState([]);
            const [testStatus, setTestStatus] = React.useState('IDLE');
            
            // Database State
            const [dbData, setDbData] = React.useState([]);
            const [newEntry, setNewEntry] = React.useState({ name: '', email: '', data: '' });
            const [isAdding, setIsAdding] = React.useState(false);
            const [firebaseStatus, setFirebaseStatus] = React.useState(firebaseReady ? 'CONNECTED' : 'DISCONNECTED');
            const [showSetupModal, setShowSetupModal] = React.useState(!firebaseReady);

            React.useEffect(() => {
                if (firebaseReady && db) {
                    const dbRef = firebase.database().ref('ally_records');
                    dbRef.on('value', (snapshot) => {
                        const data = [];
                        snapshot.forEach((childSnapshot) => {
                            data.push({
                                id: childSnapshot.key,
                                ...childSnapshot.val()
                            });
                        });
                        setDbData(data);
                    });
                    return () => dbRef.off();
                }
            }, []);

            const runStabilityCalibration = () => {
                setIsCalibrating(true);
                setTimeout(() => {
                    setStabilityScore(99.99);
                    setIsCalibrating(false);
                }, 2000);
            };

            const runSelfTest = () => {
                setTestStatus('RUNNING');
                setTestLogs([]);
                const logs = [
                    "Initializing Integrity Core...",
                    "Scanning environment secrets configuration...",
                    `Validating Author Signature: ${CREATOR_METADATA.name}`,
                    `Matching Project ID: ${CREATOR_METADATA.projectUuid}`,
                    `Firebase Status: ${firebaseStatus}`,
                    "Encryption Handshake: 256-bit AES Active",
                    "INTEGRITY VERIFIED SUCCESSFULLY."
                ];
                
                logs.forEach((log, index) => {
                    setTimeout(() => {
                        setTestLogs(prev => [...prev, log]);
                        if (index === logs.length - 1) setTestStatus('VERIFIED');
                    }, (index + 1) * 600);
                });
            };

            const addDatabaseEntry = async () => {
                if (!newEntry.name || !newEntry.email || !newEntry.data) {
                    alert('Please fill all fields');
                    return;
                }

                if (!firebaseReady || !db) {
                    alert('Firebase not configured. Please set up Firebase first.');
                    return;
                }

                setIsAdding(true);
                try {
                    const dbRef = firebase.database().ref('ally_records').push();
                    await dbRef.set({
                        name: newEntry.name,
                        email: newEntry.email,
                        data: newEntry.data,
                        timestamp: new Date().toISOString(),
                        createdBy: CREATOR_METADATA.name
                    });
                    
                    setNewEntry({ name: '', email: '', data: '' });
                    alert('Entry added successfully!');
                } catch (error) {
                    console.error('Error adding entry:', error);
                    alert('Error adding entry: ' + error.message);
                } finally {
                    setIsAdding(false);
                }
            };

            const deleteEntry = async (id) => {
                if (!firebaseReady || !db) return;
                try {
                    await firebase.database().ref('ally_records/' + id).remove();
                    alert('Entry deleted successfully!');
                } catch (error) {
                    console.error('Error deleting entry:', error);
                }
            };

            const SetupModal = () => (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-800 border border-yellow-600 rounded-xl p-6 max-w-md w-full">
                        <h3 className="text-lg font-bold text-yellow-400 mb-3">⚠️ Firebase Setup Required</h3>
                        <p className="text-gray-300 text-sm mb-4">To enable full database functionality, you need to:</p>
                        <ol className="text-sm text-gray-400 space-y-2 mb-4 list-decimal list-inside">
                            <li>Go to <strong>firebase.google.com</strong></li>
                            <li>Create a new project</li>
                            <li>Enable Realtime Database</li>
                            <li>Get your config from Project Settings</li>
                            <li>Update the FIREBASE_CONFIG in index.html</li>
                        </ol>
                        <p className="text-xs text-gray-500 mb-4">For now, you can use demo mode to test the UI.</p>
                        <button 
                            onClick={() => setShowSetupModal(false)}
                            className="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-medium py-2 rounded-md transition">
                            Continue in Demo Mode
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen">
                    {showSetupModal && <SetupModal />}
                    
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className={`w-3 h-3 ${firebaseStatus === 'CONNECTED' ? 'bg-emerald-500' : 'bg-yellow-500'} rounded-full animate-pulse`}></div>
                                <h1 className="text-xl font-bold tracking-wider text-emerald-400">ALLY // SECURITY SUITE</h1>
                            </div>
                            <span className="text-xs bg-gray-700 px-3 py-1 rounded-full text-gray-400 font-mono hidden sm:inline">
                                OWNER: {CREATOR_METADATA.name}
                            </span>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <nav className="bg-gray-800 border-b border-gray-700 flex justify-center space-x-4 p-2 text-sm flex-wrap">
                        <button 
                            onClick={() => setActiveTab('workspace')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'workspace' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            Workspace Console
                        </button>
                        <button 
                            onClick={() => setActiveTab('database')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'database' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            Database Manager
                        </button>
                        <button 
                            onClick={() => setActiveTab('security')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'security' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            Security Suite
                        </button>
                    </nav>

                    {/* Main Workspace Body */}
                    <main className="flex-grow container mx-auto p-4 max-w-6xl">
                        {activeTab === 'workspace' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-2 text-emerald-300">Database Engine Panel</h2>
                                    <p className="text-gray-400 text-sm mb-4">Live management engine supporting autonomous validation routines.</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg">
                                            <span className="text-xs font-mono text-gray-500 block mb-1">System Health Baseline</span>
                                            <div className="text-3xl font-mono font-bold text-emerald-400">{stabilityScore}%</div>
                                            <div className="text-xs text-gray-400 mt-2">Continuous runtime evaluation status.</div>
                                        </div>
                                        <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg flex flex-col justify-between">
                                            <div>
                                                <span className="text-xs font-mono text-gray-500 block mb-2">Firebase Status</span>
                                                <div className={`text-lg font-mono font-bold ${firebaseStatus === 'CONNECTED' ? 'text-emerald-400' : 'text-yellow-400'}`}>
                                                    {firebaseStatus}
                                                </div>
                                            </div>
                                            <button 
                                                onClick={runStabilityCalibration}
                                                disabled={isCalibrating}
                                                className="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-medium text-sm py-2 px-4 rounded-md transition disabled:opacity-50">
                                                {isCalibrating ? "Calibrating Systems..." : "Run Stability Calibration"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'database' && (
                            <div className="space-y-6">
                                {/* Add Entry Form */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">Add New Database Entry</h2>
                                    <div className="space-y-4">
                                        <input 
                                            type="text"
                                            placeholder="Full Name"
                                            value={newEntry.name}
                                            onChange={(e) => setNewEntry({...newEntry, name: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <input 
                                            type="email"
                                            placeholder="Email Address"
                                            value={newEntry.email}
                                            onChange={(e) => setNewEntry({...newEntry, email: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <textarea 
                                            placeholder="Data / Notes"
                                            value={newEntry.data}
                                            onChange={(e) => setNewEntry({...newEntry, data: e.target.value})}
                                            rows="4"
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <button 
                                            onClick={addDatabaseEntry}
                                            disabled={isAdding || !firebaseReady}
                                            className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 text-white font-medium py-2 px-4 rounded-md transition">
                                            {isAdding ? "Adding..." : firebaseReady ? "Add Entry to Firebase" : "Configure Firebase First"}
                                        </button>
                                    </div>
                                </div>

                                {/* Database Records */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">Database Records ({dbData.length})</h2>
                                    {dbData.length === 0 ? (
                                        <p className="text-gray-400 text-center py-8">No records yet. Add your first entry above!</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {dbData.map((record) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div>
                                                            <h3 className="text-emerald-400 font-bold">{record.name}</h3>
                                                            <p className="text-gray-400 text-sm">{record.email}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteEntry(record.id)}
                                                            className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1 rounded transition">
                                                            Delete
                                                        </button>
                                                    </div>
                                                    <p className="text-gray-300 text-sm mb-2">{record.data}</p>
                                                    <p className="text-gray-500 text-xs">{new Date(record.timestamp).toLocaleString()}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'security' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Left Side: Certificate Check */}
                                <div className="md:col-span-2 bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">Developer Self-Test Suite</h2>
                                    <p className="text-gray-400 text-sm mb-4">Run live diagnostic checking to confirm file identity boundaries.</p>
                                    
                                    <button 
                                        onClick={runSelfTest}
                                        disabled={testStatus === 'RUNNING'}
                                        className="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 px-4 rounded-md transition mb-4 w-full sm:w-auto">
                                        {testStatus === 'RUNNING' ? 'Running Core Audits...' : 'Run Developer Self-Test'}
                                    </button>

                                    {/* Console Logs */}
                                    <div className="bg-black rounded-lg p-4 font-mono text-xs text-emerald-400 min-h-[180px] border border-gray-700 space-y-2">
                                        {testLogs.length === 0 && <span className="text-gray-600">// Press button above to run local environment check...</span>}
                                        {testLogs.map((log, idx) => (
                                            <div key={idx} className={log.includes('VERIFIED') ? 'text-blue-400 font-bold border-t border-gray-800 pt-2 mt-2' : ''}>
                                                &gt; {log}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Right Side: Verified Identity Badge Card */}
                                <div className="bg-gray-800 border border-blue-900/50 rounded-xl p-6 shadow-xl flex flex-col justify-between relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-blue-500/5 rounded-full blur-2xl pointer-events-none"></div>
                                    <div>
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="text-xs font-mono tracking-widest uppercase bg-blue-950 text-blue-400 border border-blue-800/60 px-2 py-0.5 rounded">Creator Profile</span>
                                            <span className={`text-xs font-mono px-2 py-0.5 rounded ${testStatus === 'VERIFIED' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' : 'bg-gray-700 text-gray-400'}`}>
                                                {testStatus === 'VERIFIED' ? 'INTEGRITY SIGNED' : 'AWAITING TEST'}
                                            </span>
                                        </div>
                                        <h3 className="text-xl font-bold text-gray-100 mb-1">{CREATOR_METADATA.name}</h3>
                                        <p className="text-xs text-blue-400 font-mono mb-4">{CREATOR_METADATA.role}</p>
                                        
                                        <div className="space-y-2 border-t border-gray-700/60 pt-4 text-xs font-mono">
                                            <div>
                                                <span className="text-gray-500 block">PROJECT ID</span>
                                                <span className="text-gray-300">{CREATOR_METADATA.projectUuid}</span>
                                            </div>
                                            <div>
                                                <span className="text-gray-500 block">SIGNATURE LOCK</span>
                                                <span className="text-gray-300 truncate block">{CREATOR_METADATA.integrityHash}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="text-[10px] text-gray-500 font-mono pt-4 text-center border-t border-gray-700/40 mt-4">
                                        Protected Architecture &copy; 2026
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer System Signatures */}
                    <footer className="bg-gray-800 border-t border-gray-700 p-4 text-xs font-mono text-center text-gray-500">
                        <div className="container mx-auto">
                            Ally Core System Engine &bull; Designed & Authored by <span className="text-emerald-400 font-medium">{CREATOR_METADATA.name}</span> &bull; Firebase Enabled
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllyApp />);
    </script>
</body>
</html>
