<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant & Security Suite</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // Global App State & Config
        const CREATOR_METADATA = {
            name: "Kumkum Goswami",
            role: "Lead Systems Architect",
            projectUuid: "ALLY-SEC-2026-NEXUS-99X",
            integrityHash: "0x7F...KUMKUM...99"
        };

        // Firebase Configuration - EASILY EDITABLE
        const FIREBASE_CONFIG = {
            apiKey: localStorage.getItem('firebaseApiKey') || "",
            authDomain: localStorage.getItem('firebaseAuthDomain') || "",
            databaseURL: localStorage.getItem('firebaseDatabaseURL') || "",
            projectId: localStorage.getItem('firebaseProjectId') || "",
            storageBucket: localStorage.getItem('firebaseStorageBucket') || "",
            messagingSenderId: localStorage.getItem('firebaseMessagingSenderId') || "",
            appId: localStorage.getItem('firebaseAppId') || ""
        };

        let db = null;
        let firebaseReady = false;

        const initializeFirebase = async () => {
            try {
                if (!FIREBASE_CONFIG.apiKey) {
                    console.warn("Firebase not configured yet.");
                    return false;
                }
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.database();
                firebaseReady = true;
                return true;
            } catch (error) {
                console.error("Firebase initialization error:", error);
                return false;
            }
        };

        initializeFirebase();

        function FirebaseSetupGuide() {
            const [step, setStep] = React.useState(1);
            const [config, setConfig] = React.useState(FIREBASE_CONFIG);
            const [savedSuccess, setSavedSuccess] = React.useState(false);

            const saveConfig = () => {
                localStorage.setItem('firebaseApiKey', config.apiKey);
                localStorage.setItem('firebaseAuthDomain', config.authDomain);
                localStorage.setItem('firebaseDatabaseURL', config.databaseURL);
                localStorage.setItem('firebaseProjectId', config.projectId);
                localStorage.setItem('firebaseStorageBucket', config.storageBucket);
                localStorage.setItem('firebaseMessagingSenderId', config.messagingSenderId);
                localStorage.setItem('firebaseAppId', config.appId);
                setSavedSuccess(true);
                setTimeout(() => window.location.reload(), 2000);
            };

            const steps = [
                {
                    title: "Step 1: Create Firebase Project",
                    content: (
                        <div className="space-y-4">
                            <p className="text-gray-300">1. Go to <strong className="text-blue-400">firebase.google.com</strong></p>
                            <p className="text-gray-300">2. Click <strong>"Get Started"</strong></p>
                            <p className="text-gray-300">3. Click <strong>"Create a project"</strong></p>
                            <p className="text-gray-300">4. Enter project name: <strong className="text-emerald-400">ally-database</strong></p>
                            <p className="text-gray-300">5. Click <strong>"Continue"</strong> → <strong>"Create project"</strong></p>
                            <p className="text-yellow-400 mt-4">⏳ Wait for project to be created (1-2 minutes)</p>
                        </div>
                    )
                },
                {
                    title: "Step 2: Setup Realtime Database",
                    content: (
                        <div className="space-y-4">
                            <p className="text-gray-300">1. In Firebase Console, click <strong>"Realtime Database"</strong></p>
                            <p className="text-gray-300">2. Click <strong>"Create Database"</strong></p>
                            <p className="text-gray-300">3. Select Location: <strong className="text-emerald-400">United States</strong> (or your region)</p>
                            <p className="text-gray-300">4. Click <strong>"Next"</strong></p>
                            <p className="text-gray-300">5. Select <strong>"Start in test mode"</strong> (for easy setup)</p>
                            <p className="text-gray-300">6. Click <strong>"Enable"</strong></p>
                            <p className="text-yellow-400 mt-4">✅ Database is ready!</p>
                        </div>
                    )
                },
                {
                    title: "Step 3: Get Your Config Keys",
                    content: (
                        <div className="space-y-4">
                            <p className="text-gray-300">1. Click the <strong>⚙️ Gear Icon</strong> (Settings) in top-left</p>
                            <p className="text-gray-300">2. Click <strong>"Project Settings"</strong></p>
                            <p className="text-gray-300">3. Scroll down to <strong>"Your apps"</strong> section</p>
                            <p className="text-gray-300">4. If no app exists, click <strong>"</></strong> to add web app</p>
                            <p className="text-gray-300">5. Copy all the keys shown (you'll paste them next)</p>
                            <p className="text-yellow-400 mt-4">📋 Have your keys ready for the next step!</p>
                        </div>
                    )
                },
                {
                    title: "Step 4: Paste Your Config Keys",
                    content: (
                        <div className="space-y-4">
                            <p className="text-gray-300 mb-4">Paste your Firebase config keys below:</p>
                            <input 
                                type="text"
                                placeholder="API Key"
                                value={config.apiKey}
                                onChange={(e) => setConfig({...config, apiKey: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="Auth Domain (e.g., ally-database.firebaseapp.com)"
                                value={config.authDomain}
                                onChange={(e) => setConfig({...config, authDomain: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="Database URL (e.g., https://ally-database.firebaseio.com)"
                                value={config.databaseURL}
                                onChange={(e) => setConfig({...config, databaseURL: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="Project ID"
                                value={config.projectId}
                                onChange={(e) => setConfig({...config, projectId: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="Storage Bucket"
                                value={config.storageBucket}
                                onChange={(e) => setConfig({...config, storageBucket: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="Messaging Sender ID"
                                value={config.messagingSenderId}
                                onChange={(e) => setConfig({...config, messagingSenderId: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            <input 
                                type="text"
                                placeholder="App ID"
                                value={config.appId}
                                onChange={(e) => setConfig({...config, appId: e.target.value})}
                                className="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:border-emerald-500 focus:outline-none"
                            />
                            {savedSuccess && (
                                <p className="text-emerald-400 font-bold">✅ Config saved! Reloading...</p>
                            )}
                            <button 
                                onClick={saveConfig}
                                className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition">
                                Save & Activate Firebase
                            </button>
                        </div>
                    )
                }
            ];

            return (
                <div className="flex flex-col min-h-screen bg-gray-900">
                    <header className="bg-gray-800 border-b border-gray-700 p-4">
                        <h1 className="text-2xl font-bold tracking-wider text-emerald-400">ALLY FIREBASE SETUP</h1>
                    </header>

                    <main className="flex-grow container mx-auto p-4 max-w-2xl">
                        <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                            <h2 className="text-xl font-bold text-emerald-300 mb-6">{steps[step - 1].title}</h2>
                            <div className="mb-6">
                                {steps[step - 1].content}
                            </div>

                            {/* Progress Bar */}
                            <div className="mb-6">
                                <div className="w-full bg-gray-700 rounded-full h-2">
                                    <div 
                                        className="bg-emerald-500 h-2 rounded-full transition-all"
                                        style={{width: `${(step / steps.length) * 100}%`}}
                                    ></div>
                                </div>
                                <p className="text-xs text-gray-400 mt-2">Step {step} of {steps.length}</p>
                            </div>

                            {/* Navigation Buttons */}
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => setStep(Math.max(1, step - 1))}
                                    disabled={step === 1}
                                    className="flex-1 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 text-white font-bold py-2 rounded transition">
                                    ← Previous
                                </button>
                                <button 
                                    onClick={() => setStep(Math.min(steps.length, step + 1))}
                                    disabled={step === steps.length}
                                    className="flex-1 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-bold py-2 rounded transition">
                                    Next →
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        function AllyApp() {
            const [activeTab, setActiveTab] = React.useState('workspace');
            const [stabilityScore, setStabilityScore] = React.useState(94.2);
            const [isCalibrating, setIsCalibrating] = React.useState(false);
            const [testLogs, setTestLogs] = React.useState([]);
            const [testStatus, setTestStatus] = React.useState('IDLE');
            
            // Database State
            const [dbData, setDbData] = React.useState([]);
            const [newEntry, setNewEntry] = React.useState({ name: '', email: '', data: '' });
            const [isAdding, setIsAdding] = React.useState(false);
            const [firebaseStatus, setFirebaseStatus] = React.useState(firebaseReady ? 'CONNECTED' : 'NOT CONFIGURED');

            React.useEffect(() => {
                if (firebaseReady && db) {
                    const dbRef = firebase.database().ref('ally_records');
                    dbRef.on('value', (snapshot) => {
                        const data = [];
                        snapshot.forEach((childSnapshot) => {
                            data.push({
                                id: childSnapshot.key,
                                ...childSnapshot.val()
                            });
                        });
                        setDbData(data.reverse());
                        setFirebaseStatus('CONNECTED ✅');
                    });
                    return () => dbRef.off();
                }
            }, []);

            const runStabilityCalibration = () => {
                setIsCalibrating(true);
                setTimeout(() => {
                    setStabilityScore(99.99);
                    setIsCalibrating(false);
                }, 2000);
            };

            const runSelfTest = () => {
                setTestStatus('RUNNING');
                setTestLogs([]);
                const logs = [
                    "Initializing Integrity Core...",
                    "Scanning environment secrets configuration...",
                    `Validating Author Signature: ${CREATOR_METADATA.name}`,
                    `Matching Project ID: ${CREATOR_METADATA.projectUuid}`,
                    `Firebase Status: ${firebaseStatus}`,
                    "Encryption Handshake: 256-bit AES Active",
                    "INTEGRITY VERIFIED SUCCESSFULLY."
                ];
                
                logs.forEach((log, index) => {
                    setTimeout(() => {
                        setTestLogs(prev => [...prev, log]);
                        if (index === logs.length - 1) setTestStatus('VERIFIED');
                    }, (index + 1) * 600);
                });
            };

            const addDatabaseEntry = async () => {
                if (!newEntry.name || !newEntry.email || !newEntry.data) {
                    alert('⚠️ Please fill all fields!');
                    return;
                }

                if (!firebaseReady || !db) {
                    alert('❌ Firebase not connected. Go to Settings tab to configure.');
                    return;
                }

                setIsAdding(true);
                try {
                    const dbRef = firebase.database().ref('ally_records').push();
                    await dbRef.set({
                        name: newEntry.name,
                        email: newEntry.email,
                        data: newEntry.data,
                        timestamp: new Date().toISOString(),
                        createdBy: CREATOR_METADATA.name
                    });
                    
                    setNewEntry({ name: '', email: '', data: '' });
                    alert('✅ Entry added successfully!');
                } catch (error) {
                    console.error('Error adding entry:', error);
                    alert('❌ Error: ' + error.message);
                } finally {
                    setIsAdding(false);
                }
            };

            const deleteEntry = async (id) => {
                if (!firebaseReady || !db) return;
                if (!window.confirm('Are you sure you want to delete this entry?')) return;
                try {
                    await firebase.database().ref('ally_records/' + id).remove();
                    alert('✅ Entry deleted!');
                } catch (error) {
                    console.error('Error deleting entry:', error);
                }
            };

            if (!firebaseReady) {
                return <FirebaseSetupGuide />;
            }

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                                <h1 className="text-xl font-bold tracking-wider text-emerald-400">ALLY // SECURITY SUITE</h1>
                            </div>
                            <span className="text-xs bg-gray-700 px-3 py-1 rounded-full text-gray-400 font-mono hidden sm:inline">
                                {firebaseStatus}
                            </span>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <nav className="bg-gray-800 border-b border-gray-700 flex justify-center space-x-2 p-2 text-sm flex-wrap">
                        <button 
                            onClick={() => setActiveTab('workspace')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'workspace' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            📊 Workspace
                        </button>
                        <button 
                            onClick={() => setActiveTab('database')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'database' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            💾 Database
                        </button>
                        <button 
                            onClick={() => setActiveTab('security')}
                            className={`px-4 py-2 rounded-md transition ${activeTab === 'security' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            🔒 Security
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow container mx-auto p-4 max-w-6xl">
                        {activeTab === 'workspace' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">System Status</h2>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg">
                                            <span className="text-xs font-mono text-gray-500 block mb-1">System Health</span>
                                            <div className="text-3xl font-mono font-bold text-emerald-400">{stabilityScore}%</div>
                                            <button 
                                                onClick={runStabilityCalibration}
                                                disabled={isCalibrating}
                                                className="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm py-2 px-4 rounded-md transition disabled:opacity-50">
                                                {isCalibrating ? "Calibrating..." : "Calibrate System"}
                                            </button>
                                        </div>
                                        <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg">
                                            <span className="text-xs font-mono text-gray-500 block mb-1">Database Records</span>
                                            <div className="text-3xl font-mono font-bold text-blue-400">{dbData.length}</div>
                                            <p className="text-xs text-gray-400 mt-4">Total entries stored in Firebase</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'database' && (
                            <div className="space-y-6">
                                {/* Add Entry Form */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">➕ Add New Entry</h2>
                                    <div className="space-y-3">
                                        <input 
                                            type="text"
                                            placeholder="Full Name"
                                            value={newEntry.name}
                                            onChange={(e) => setNewEntry({...newEntry, name: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <input 
                                            type="email"
                                            placeholder="Email Address"
                                            value={newEntry.email}
                                            onChange={(e) => setNewEntry({...newEntry, email: e.target.value})}
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <textarea 
                                            placeholder="Data / Notes / Information"
                                            value={newEntry.data}
                                            onChange={(e) => setNewEntry({...newEntry, data: e.target.value})}
                                            rows="3"
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                                        />
                                        <button 
                                            onClick={addDatabaseEntry}
                                            disabled={isAdding}
                                            className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50">
                                            {isAdding ? "⏳ Adding..." : "✅ Add to Database"}
                                        </button>
                                    </div>
                                </div>

                                {/* Database Records */}
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">📋 Records ({dbData.length})</h2>
                                    {dbData.length === 0 ? (
                                        <p className="text-gray-400 text-center py-12">📭 No records yet. Add your first entry above!</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {dbData.map((record, idx) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4 hover:border-emerald-600 transition">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex-1">
                                                            <h3 className="text-emerald-400 font-bold">#{idx + 1} {record.name}</h3>
                                                            <p className="text-gray-400 text-sm">{record.email}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteEntry(record.id)}
                                                            className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1 rounded transition ml-2">
                                                            🗑️ Delete
                                                        </button>
                                                    </div>
                                                    <p className="text-gray-300 text-sm mb-2 bg-gray-800 p-2 rounded border border-gray-700">{record.data}</p>
                                                    <p className="text-gray-500 text-xs">⏰ {new Date(record.timestamp).toLocaleString()}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'security' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-emerald-300">🔐 Security Diagnostics</h2>
                                    
                                    <button 
                                        onClick={runSelfTest}
                                        disabled={testStatus === 'RUNNING'}
                                        className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-md transition mb-4 disabled:opacity-50">
                                        {testStatus === 'RUNNING' ? '⏳ Running Tests...' : '▶️ Run Security Test'}
                                    </button>

                                    <div className="bg-black rounded-lg p-4 font-mono text-xs text-emerald-400 min-h-[200px] border border-gray-700 space-y-2 overflow-y-auto">
                                        {testLogs.length === 0 && <span className="text-gray-600">// Press button above to run security diagnostics...</span>}
                                        {testLogs.map((log, idx) => (
                                            <div key={idx} className={log.includes('VERIFIED') ? 'text-blue-400 font-bold border-t border-gray-800 pt-2 mt-2' : ''}>
                                                &gt; {log}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Creator Info Card */}
                                <div className="bg-gray-800 border border-blue-900/50 rounded-xl p-6 shadow-xl">
                                    <h3 className="text-xl font-bold text-gray-100 mb-4">👤 Creator Profile</h3>
                                    <div className="space-y-3 font-mono text-sm">
                                        <div>
                                            <span className="text-gray-500">Name:</span>
                                            <p className="text-emerald-400 font-bold">{CREATOR_METADATA.name}</p>
                                        </div>
                                        <div>
                                            <span className="text-gray-500">Role:</span>
                                            <p className="text-blue-400">{CREATOR_METADATA.role}</p>
                                        </div>
                                        <div>
                                            <span className="text-gray-500">Project ID:</span>
                                            <p className="text-gray-300">{CREATOR_METADATA.projectUuid}</p>
                                        </div>
                                        <div>
                                            <span className="text-gray-500">Signature:</span>
                                            <p className="text-gray-300">{CREATOR_METADATA.integrityHash}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 border-t border-gray-700 p-4 text-xs font-mono text-center text-gray-500">
                        <div className="container mx-auto">
                            Ally Core System Engine • Designed by <span className="text-emerald-400 font-medium">{CREATOR_METADATA.name}</span> • Firebase Powered ✨
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllyApp />);
    </script>
</body>
</html>
