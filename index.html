<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant - Ultimate Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const CREATOR = { name: "Kumkum Goswami", role: "Lead Systems Architect", projectId: "ALLY-SEC-2026-NEXUS-99X" };

        // Firebase Config
        const FIREBASE_CONFIG = {
            apiKey: localStorage.getItem('fb_apiKey') || "",
            authDomain: localStorage.getItem('fb_authDomain') || "",
            databaseURL: localStorage.getItem('fb_databaseURL') || "",
            projectId: localStorage.getItem('fb_projectId') || ""
        };

        let db = null, auth = null, firebaseReady = false;

        try {
            if (FIREBASE_CONFIG.apiKey) {
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.database();
                auth = firebase.auth();
                firebaseReady = true;
            }
        } catch (e) {
            console.log("Firebase not configured");
        }

        function FirebaseSetup() {
            const [config, setConfig] = React.useState(FIREBASE_CONFIG);
            const [saved, setSaved] = React.useState(false);

            const saveConfig = () => {
                localStorage.setItem('fb_apiKey', config.apiKey);
                localStorage.setItem('fb_authDomain', config.authDomain);
                localStorage.setItem('fb_databaseURL', config.databaseURL);
                localStorage.setItem('fb_projectId', config.projectId);
                setSaved(true);
                setTimeout(() => window.location.reload(), 2000);
            };

            return (
                <div className="min-h-screen bg-gray-900 p-4 flex items-center justify-center">
                    <div className="bg-gray-800 border border-emerald-600 rounded-xl p-8 max-w-2xl w-full">
                        <h1 className="text-3xl font-bold text-emerald-400 mb-6">🔥 ALLY FIREBASE SETUP</h1>
                        
                        <div className="bg-gray-900 p-4 rounded-lg mb-6 border border-yellow-600">
                            <h3 className="text-yellow-400 font-bold mb-3">⚡ QUICK SETUP (2 mins):</h3>
                            <ol className="text-gray-300 text-sm space-y-2 list-decimal list-inside">
                                <li>Go to <strong>firebase.google.com</strong></li>
                                <li>Create project: <strong>ally-database</strong></li>
                                <li>Create Realtime Database (test mode)</li>
                                <li>Go to Settings → Project Settings</li>
                                <li>Copy config and paste below</li>
                            </ol>
                        </div>

                        <div className="space-y-3 mb-6">
                            <input type="text" placeholder="API Key" value={config.apiKey} onChange={(e) => setConfig({...config, apiKey: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none text-sm" />
                            <input type="text" placeholder="Auth Domain" value={config.authDomain} onChange={(e) => setConfig({...config, authDomain: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none text-sm" />
                            <input type="text" placeholder="Database URL" value={config.databaseURL} onChange={(e) => setConfig({...config, databaseURL: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none text-sm" />
                            <input type="text" placeholder="Project ID" value={config.projectId} onChange={(e) => setConfig({...config, projectId: e.target.value})} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none text-sm" />
                        </div>

                        {saved && <p className="text-emerald-400 font-bold mb-4">✅ Saved! Reloading...</p>}
                        <button onClick={saveConfig} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition">✅ SAVE & ACTIVATE</button>
                    </div>
                </div>
            );
        }

        function AllyApp() {
            const [user, setUser] = React.useState(null);
            const [authMode, setAuthMode] = React.useState('login');
            const [authEmail, setAuthEmail] = React.useState('');
            const [authPassword, setAuthPassword] = React.useState('');
            const [activeTab, setActiveTab] = React.useState('database');
            const [records, setRecords] = React.useState(() => JSON.parse(localStorage.getItem('allyRecords') || '[]'));
            const [filteredRecords, setFilteredRecords] = React.useState(records);
            const [form, setForm] = React.useState({ name: '', email: '', data: '' });
            const [editingId, setEditingId] = React.useState(null);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filterEmail, setFilterEmail] = React.useState('');
            const [isAdding, setIsAdding] = React.useState(false);
            const [syncStatus, setSyncStatus] = React.useState('OFFLINE');
            const [cloudRecords, setCloudRecords] = React.useState([]);

            React.useEffect(() => {
                localStorage.setItem('allyRecords', JSON.stringify(records));
                filterRecords();
            }, [records]);

            React.useEffect(() => {
                if (firebaseReady && user) {
                    const dbRef = firebase.database().ref('users/' + user.uid + '/records');
                    dbRef.on('value', (snapshot) => {
                        const data = [];
                        snapshot.forEach((child) => data.push({ id: child.key, ...child.val() }));
                        setCloudRecords(data);
                        setSyncStatus('SYNCED ✅');
                    });
                    return () => dbRef.off();
                }
            }, [user]);

            React.useEffect(() => {
                if (firebaseReady && auth) {
                    auth.onAuthStateChanged((currentUser) => setUser(currentUser));
                }
            }, []);

            const filterRecords = () => {
                let filtered = records.filter(r => 
                    (r.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                     r.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                     r.data.toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (!filterEmail || r.email.toLowerCase().includes(filterEmail.toLowerCase()))
                );
                setFilteredRecords(filtered);
            };

            React.useEffect(() => {
                filterRecords();
            }, [searchTerm, filterEmail, records]);

            const handleAuth = async () => {
                try {
                    if (authMode === 'login') {
                        await auth.signInWithEmailAndPassword(authEmail, authPassword);
                        setSyncStatus('SYNCING...');
                    } else {
                        await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                        setSyncStatus('SYNCING...');
                    }
                    setAuthEmail('');
                    setAuthPassword('');
                } catch (error) {
                    alert('❌ ' + error.message);
                }
            };

            const addOrUpdateRecord = () => {
                if (!form.name || !form.email || !form.data) {
                    alert('⚠️ Fill all fields!');
                    return;
                }

                setIsAdding(true);
                setTimeout(() => {
                    if (editingId) {
                        setRecords(records.map(r => r.id === editingId ? { ...r, ...form, timestamp: new Date().toLocaleString() } : r));
                        setEditingId(null);
                        
                        if (firebaseReady && user) {
                            firebase.database().ref('users/' + user.uid + '/records/' + editingId).set({ ...form, timestamp: new Date().toLocaleString() });
                        }
                    } else {
                        const newRecord = { id: Date.now(), ...form, timestamp: new Date().toLocaleString() };
                        setRecords([...records, newRecord]);
                        
                        if (firebaseReady && user) {
                            firebase.database().ref('users/' + user.uid + '/records/' + newRecord.id).set(newRecord);
                        }
                    }
                    setForm({ name: '', email: '', data: '' });
                    setIsAdding(false);
                    alert(editingId ? '✅ Updated!' : '✅ Added!');
                }, 500);
            };

            const editRecord = (record) => {
                setForm(record);
                setEditingId(record.id);
            };

            const deleteRecord = (id) => {
                if (window.confirm('Delete this entry?')) {
                    setRecords(records.filter(r => r.id !== id));
                    if (firebaseReady && user) {
                        firebase.database().ref('users/' + user.uid + '/records/' + id).remove();
                    }
                    alert('✅ Deleted!');
                }
            };

            const exportCSV = () => {
                let csv = 'Name,Email,Data,Timestamp\n';
                records.forEach(r => csv += `"${r.name}","${r.email}","${r.data}","${r.timestamp}"\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ally_records.csv';
                a.click();
                alert('✅ Exported!');
            };

            const syncToCloud = () => {
                if (!firebaseReady || !user) {
                    alert('❌ Firebase not configured or not logged in');
                    return;
                }
                setSyncStatus('SYNCING...');
                records.forEach(r => {
                    firebase.database().ref('users/' + user.uid + '/records/' + r.id).set(r);
                });
                setTimeout(() => setSyncStatus('SYNCED ✅'), 1000);
            };

            // Auth UI
            if (!firebaseReady) {
                return <FirebaseSetup />;
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-gray-900 p-4 flex items-center justify-center">
                        <div className="bg-gray-800 border border-emerald-600 rounded-xl p-8 max-w-md w-full">
                            <h1 className="text-3xl font-bold text-emerald-400 mb-6">🔐 ALLY AUTH</h1>
                            <div className="space-y-4">
                                <input type="email" placeholder="Email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                <input type="password" placeholder="Password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                <button onClick={handleAuth} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition">{authMode === 'login' ? '🔓 LOGIN' : '✍️ REGISTER'}</button>
                                <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 py-2 rounded transition">{authMode === 'login' ? 'Need account? Register' : 'Already have account? Login'}</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Main App
            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-emerald-400">⚡ ALLY ULTIMATE</h1>
                            <div className="flex items-center space-x-4">
                                <span className={`text-xs px-3 py-1 rounded-full font-bold ${syncStatus.includes('✅') ? 'bg-emerald-600 text-white' : 'bg-yellow-600 text-white'}`}>{syncStatus}</span>
                                <button onClick={() => auth.signOut()} className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1 rounded transition">🚪 LOGOUT</button>
                            </div>
                        </div>
                    </header>

                    <nav className="bg-gray-800 border-b border-gray-700 flex justify-center space-x-2 p-2 flex-wrap">
                        <button onClick={() => setActiveTab('database')} className={`px-4 py-2 rounded-md transition ${activeTab === 'database' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>💾 DATABASE</button>
                        <button onClick={() => setActiveTab('search')} className={`px-4 py-2 rounded-md transition ${activeTab === 'search' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>🔍 SEARCH</button>
                        <button onClick={() => setActiveTab('cloud')} className={`px-4 py-2 rounded-md transition ${activeTab === 'cloud' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>☁️ CLOUD</button>
                        <button onClick={() => setActiveTab('info')} className={`px-4 py-2 rounded-md transition ${activeTab === 'info' ? 'bg-emerald-600 text-white font-bold' : 'text-gray-400 hover:text-white'}`}>ℹ️ INFO</button>
                    </nav>

                    <main className="flex-grow container mx-auto p-4 max-w-6xl">
                        {activeTab === 'database' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h2 className="text-xl font-bold text-emerald-300 mb-4">{editingId ? '✏️ EDIT ENTRY' : '➕ ADD NEW ENTRY'}</h2>
                                    <div className="space-y-3">
                                        <input type="text" placeholder="Full Name" value={form.name} onChange={(e) => setForm({...form, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                        <input type="email" placeholder="Email" value={form.email} onChange={(e) => setForm({...form, email: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                        <textarea placeholder="Data / Notes" value={form.data} onChange={(e) => setForm({...form, data: e.target.value})} rows="3" className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                        <div className="flex gap-2">
                                            <button onClick={addOrUpdateRecord} disabled={isAdding} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">{isAdding ? '⏳...' : (editingId ? '✏️ UPDATE' : '✅ ADD')}</button>
                                            {editingId && <button onClick={() => {setEditingId(null); setForm({name: '', email: '', data: ''});}} className="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 rounded-lg transition">❌ CANCEL</button>}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-bold text-emerald-300">📋 RECORDS ({records.length})</h2>
                                        <div className="space-x-2">
                                            <button onClick={exportCSV} className="bg-green-600 hover:bg-green-500 text-white text-sm px-4 py-2 rounded-lg transition">📥 EXPORT</button>
                                            <button onClick={syncToCloud} className="bg-purple-600 hover:bg-purple-500 text-white text-sm px-4 py-2 rounded-lg transition">☁️ SYNC</button>
                                        </div>
                                    </div>
                                    
                                    {records.length === 0 ? (
                                        <p className="text-gray-400 text-center py-12">📭 No records!</p>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {records.map((record, idx) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4 hover:border-emerald-600 transition">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex-1">
                                                            <h3 className="text-emerald-400 font-bold">#{idx + 1} {record.name}</h3>
                                                            <p className="text-gray-400 text-sm">{record.email}</p>
                                                            <p className="text-gray-300 text-sm mt-2 bg-gray-800 p-2 rounded">{record.data}</p>
                                                            <p className="text-gray-500 text-xs mt-2">⏰ {record.timestamp}</p>
                                                        </div>
                                                        <div className="space-x-2 ml-2">
                                                            <button onClick={() => editRecord(record)} className="bg-yellow-600 hover:bg-yellow-500 text-white text-xs px-2 py-1 rounded transition">✏️ EDIT</button>
                                                            <button onClick={() => deleteRecord(record.id)} className="bg-red-600 hover:bg-red-500 text-white text-xs px-2 py-1 rounded transition">🗑️ DEL</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'search' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h2 className="text-xl font-bold text-emerald-300 mb-4">🔍 SEARCH & FILTER</h2>
                                    <div className="space-y-3 mb-6">
                                        <input type="text" placeholder="Search by name, email or data..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                        <input type="email" placeholder="Filter by email..." value={filterEmail} onChange={(e) => setFilterEmail(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:border-emerald-500 focus:outline-none" />
                                    </div>

                                    <h3 className="text-emerald-400 font-bold mb-3">Results: {filteredRecords.length} found</h3>
                                    {filteredRecords.length === 0 ? (
                                        <p className="text-gray-400 text-center py-12">🔎 No results found</p>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {filteredRecords.map((record) => (
                                                <div key={record.id} className="bg-gray-900 border border-gray-700 rounded-lg p-4">
                                                    <h3 className="text-emerald-400 font-bold">{record.name}</h3>
                                                    <p className="text-gray-400 text-sm">{record.email}</p>
                                                    <p className="text-gray-300 text-sm mt-2">{record.data}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'cloud' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h2 className="text-xl font-bold text-emerald-300 mb-4">☁️ CLOUD SYNC</h2>
                                    <p className="text-gray-400 mb-4">Local Records: {records.length} | Cloud Records: {cloudRecords.length}</p>
                                    <button onClick={syncToCloud} className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg transition mb-6">☁️ SYNC ALL TO CLOUD</button>

                                    <h3 className="text-emerald-400 font-bold mb-3">Cloud Backup:</h3>
                                    {cloudRecords.length === 0 ? (
                                        <p className="text-gray-400">No cloud records yet. Click sync button above!</p>
                                    ) : (
                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {cloudRecords.map((record) => (
                                                <div key={record.id} className="bg-gray-900 border border-emerald-700 rounded-lg p-4">
                                                    <h3 className="text-emerald-400 font-bold">{record.name}</h3>
                                                    <p className="text-gray-400 text-sm">{record.email}</p>
                                                    <p className="text-gray-300 text-sm mt-2">{record.data}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 border border-emerald-600 rounded-xl p-6">
                                    <h2 className="text-2xl font-bold text-emerald-300 mb-4">✨ ALLY ULTIMATE</h2>
                                    <div className="space-y-3 text-gray-300">
                                        <p><span className="text-gray-500">Creator:</span> {CREATOR.name}</p>
                                        <p><span className="text-gray-500">Role:</span> {CREATOR.role}</p>
                                        <p><span className="text-gray-500">Project ID:</span> {CREATOR.projectId}</p>
                                        <p><span className="text-gray-500">User:</span> {user.email}</p>
                                    </div>
                                </div>

                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-4">🚀 FEATURES</h3>
                                    <ul className="space-y-2 text-gray-300">
                                        <li>✅ Add, Edit & Delete Records</li>
                                        <li>✅ Advanced Search & Filter</li>
                                        <li>✅ Cloud Sync (Firebase)</li>
                                        <li>✅ User Authentication</li>
                                        <li>✅ Export to CSV</li>
                                        <li>✅ Real-time Updates</li>
                                        <li>✅ Offline Access</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-gray-800 border-t border-gray-700 p-4 text-center text-gray-500 text-xs">Ally Ultimate Edition • {CREATOR.name} © 2026</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(firebaseReady ? <AllyApp /> : <FirebaseSetup />);
    </script>
</body>
</html>
