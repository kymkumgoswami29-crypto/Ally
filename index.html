<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally DB Assistant & Security Suite</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // Global App State & Config
        const CREATOR_METADATA = {
            name: "Kumkum Goswami",
            role: "Lead Systems Architect",
            projectUuid: "ALLY-SEC-2026-NEXUS-99X",
            integrityHash: "0x7F...KUMKUM...99"
        };

        function AllyApp() {
            const [activeTab, setActiveTab] = React.useState('workspace');
            const [stabilityScore, setStabilityScore] = React.useState(94.2);
            const [isCalibrating, setIsCalibrating] = React.useState(false);
            const [testLogs, setTestLogs] = React.useState([]);
            const [testStatus, setTestStatus] = React.useState('IDLE');

            const runStabilityCalibration = () => {
                setIsCalibrating(true);
                setTimeout(() => {
                    setStabilityScore(99.99);
                    setIsCalibrating(false);
                }, 2000);
            };

            const runSelfTest = () => {
                setTestStatus('RUNNING');
                setTestLogs([]);
                const logs = [
                    "Initializing Integrity Core...",
                    "Scanning environment secrets configuration...",
                    `Validating Author Signature: ${CREATOR_METADATA.name}`,
                    `Matching Project ID: ${CREATOR_METADATA.projectUuid}`,
                    "Encryption Handshake: 256-bit AES Active",
                    "INTEGRITY VERIFIED SUCCESSFULLY."
                ];
                
                logs.forEach((log, index) => {
                    setTimeout(() => {
                        setTestLogs(prev => [...prev, log]);
                        if (index === logs.length - 1) setTestStatus('VERIFIED');
                    }, (index + 1) * 600);
                });
            };

            return (
                <div class="flex flex-col min-h-screen">
                    {/* Header */}
                    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
                        <div class="container mx-auto flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                                <h1 class="text-xl font-bold tracking-wider text-emerald-400">ALLY // SECURITY SUITE</h1>
                            </div>
                            <span class="text-xs bg-gray-700 px-3 py-1 rounded-full text-gray-400 font-mono hidden sm:inline">
                                OWNER: {CREATOR_METADATA.name}
                            </span>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <nav class="bg-gray-800 border-b border-gray-700 flex justify-center space-x-4 p-2 text-sm">
                        <button 
                            onClick={() => setActiveTab('workspace')}
                            class={`px-4 py-2 rounded-md transition ${activeTab === 'workspace' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            Workspace Console
                        </button>
                        <button 
                            onClick={() => setActiveTab('security')}
                            class={`px-4 py-2 rounded-md transition ${activeTab === 'security' ? 'bg-emerald-600 text-white font-medium' : 'text-gray-400 hover:text-white'}`}>
                            Telemetry Mask & Proxy
                        </button>
                    </nav>

                    {/* Main Workspace Body */}
                    <main class="flex-grow container mx-auto p-4 max-w-4xl">
                        {activeTab === 'workspace' ? (
                            <div class="space-y-6">
                                <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 class="text-lg font-semibold mb-2 text-emerald-300">Database Engine Panel</h2>
                                    <p class="text-gray-400 text-sm mb-4">Live management engine supporting autonomous validation routines.</p>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="bg-gray-900 border border-gray-700 p-4 rounded-lg">
                                            <span class="text-xs font-mono text-gray-500 block mb-1">System Health Baseline</span>
                                            <div class="text-3xl font-mono font-bold text-emerald-400">{stabilityScore}%</div>
                                            <div class="text-xs text-gray-400 mt-2">Continuous runtime evaluation status.</div>
                                        </div>
                                        <div class="bg-gray-900 border border-gray-700 p-4 rounded-lg flex flex-col justify-between">
                                            <span class="text-xs font-mono text-gray-500 block">Self-Calibration Loop</span>
                                            <button 
                                                onClick={runStabilityCalibration}
                                                disabled={isCalibrating}
                                                class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-medium text-sm py-2 px-4 rounded-md transition disabled:opacity-50">
                                                {isCalibrating ? "Calibrating Systems..." : "Run Stability Calibration"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Left Side: Certificate Check */}
                                <div class="md:col-span-2 bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                                    <h2 class="text-lg font-semibold mb-4 text-emerald-300">Developer Self-Test Suite</h2>
                                    <p class="text-gray-400 text-sm mb-4">Run live diagnostic checking to confirm file identity boundaries.</p>
                                    
                                    <button 
                                        onClick={runSelfTest}
                                        disabled={testStatus === 'RUNNING'}
                                        class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 px-4 rounded-md transition mb-4 w-full sm:w-auto">
                                        {testStatus === 'RUNNING' ? 'Running Core Audits...' : 'Run Developer Self-Test'}
                                    </button>

                                    {/* Console Logs */}
                                    <div class="bg-black rounded-lg p-4 font-mono text-xs text-emerald-400 min-h-[180px] border border-gray-700 space-y-2">
                                        {testLogs.length === 0 && <span class="text-gray-600">// Press button above to run local environment check...</span>}
                                        {testLogs.map((log, idx) => (
                                            <div key={idx} class={log.includes('VERIFIED') ? 'text-blue-400 font-bold border-t border-gray-800 pt-2 mt-2' : ''}>
                                                &gt; {log}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Right Side: Verified Identity Badge Card */}
                                <div class="bg-gray-800 border border-blue-900/50 rounded-xl p-6 shadow-xl flex flex-col justify-between relative overflow-hidden">
                                    <div class="absolute top-0 right-0 w-24 h-24 bg-blue-500/5 rounded-full blur-2xl pointer-events-none"></div>
                                    <div>
                                        <div class="flex justify-between items-start mb-4">
                                            <span class="text-xs font-mono tracking-widest uppercase bg-blue-950 text-blue-400 border border-blue-800/60 px-2 py-0.5 rounded">Creator Profile</span>
                                            <span class={`text-xs font-mono px-2 py-0.5 rounded ${testStatus === 'VERIFIED' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' : 'bg-gray-700 text-gray-400'}`}>
                                                {testStatus === 'VERIFIED' ? 'INTEGRITY SIGNED' : 'AWAITING TEST'}
                                            </span>
                                        </div>
                                        <h3 class="text-xl font-bold text-gray-100 mb-1">{CREATOR_METADATA.name}</h3>
                                        <p class="text-xs text-blue-400 font-mono mb-4">{CREATOR_METADATA.role}</p>
                                        
                                        <div class="space-y-2 border-t border-gray-700/60 pt-4 text-xs font-mono">
                                            <div>
                                                <span class="text-gray-500 block">PROJECT ID</span>
                                                <span class="text-gray-300">{CREATOR_METADATA.projectUuid}</span>
                                            </div>
                                            <div>
                                                <span class="text-gray-500 block">SIGNATURE LOCK</span>
                                                <span class="text-gray-300 truncate block">{CREATOR_METADATA.integrityHash}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="text-[10px] text-gray-500 font-mono pt-4 text-center border-t border-gray-700/40 mt-4">
                                        Protected Architecture &copy; 2026
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer System Signatures */}
                    <footer class="bg-gray-800 border-t border-gray-700 p-4 text-xs font-mono text-center text-gray-500">
                        <div class="container mx-auto">
                            Ally Core System Engine &bull; Designed & Authored by <span class="text-emerald-400 font-medium">{CREATOR_METADATA.name}</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllyApp />);
    </script>
</body>
</html>
